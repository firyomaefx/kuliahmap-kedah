version: "3.8"

services:
  kuliahmap:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kuliahmap-app
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=/app/data/kuliahmap.db
      - NODE_ENV=production
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkeykuliahmapkedah2026}
    volumes:
      - kuliahmap-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  kuliahmap-data:
